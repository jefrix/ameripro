<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ameripro Local Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=1" />
</head>
<body>
<div id="root">
  <div class="app ameripro-app">
    <header class="top-bar">
      <div class="tb-left">
        <div class="logo">
          <svg width="34" height="34" viewBox="0 0 34 34" aria-hidden="true">
            <circle cx="17" cy="17" r="15" fill="none" stroke="#73ff9a" stroke-width="1.3"></circle>
            <path d="M8 18h18M17 8v18" stroke="#73ff9a" stroke-width="1"></path>
            <circle cx="17" cy="17" r="4" fill="rgba(115,255,154,.22)" stroke="#73ff9a" stroke-width="1"></circle>
          </svg>
          <div>
            <div class="logo-t">AMERIPRO OPERATIONS</div>
            <div class="logo-st">LOCAL SERVICE MAP / GEORGIA USA</div>
          </div>
        </div>
      </div>
      <div class="tb-center">
        <div class="class-banner">Ameripro // Local Data</div>
      </div>
      <div class="tb-right">
        <div class="dtg">
          <div class="dtg-lbl">LOCAL</div>
          <div class="dtg-val" data-local-time>--:--:-- ET</div>
        </div>
        <div class="op-badge">STATUS <span data-app-status>READY</span></div>
      </div>
    </header>

    <main class="main">
      <aside class="rail-left">
        <div class="rail-hd">
          <span>LOCAL LAYERS</span>
          <span class="rail-hd-count">0 ON</span>
        </div>
        <div class="layers"></div>
        <div class="rail-ft">
          <button class="rail-btn" type="button" data-reset-local>RESET VIEW</button>
        </div>
      </aside>

      <section class="globe-wrap">
        <div class="globe" aria-hidden="true"></div>
        <div class="xh xh-tl"><span></span><span></span></div>
        <div class="xh xh-tr"><span></span><span></span></div>
        <div class="xh xh-bl"><span></span><span></span></div>
        <div class="xh xh-br"><span></span><span></span></div>
        <div class="scanlines"></div>
      </section>

      <aside class="rail-right">
        <div class="inspector empty">
          <div class="insp-hd">INSPECTOR</div>
          <div class="insp-empty">SELECT A LOCAL OBJECT<br><span>OR CLICK A PANEL ITEM</span></div>
        </div>
        <div class="feed">
          <div class="feed-head">
            <span>EVENT PANEL</span>
            <span class="feed-count">LOCAL</span>
          </div>
          <div class="feed-list">
            <div class="feed-empty">TOGGLE A LAYER<br><span>AMERIPRO / RESTAURANTS / SALES</span></div>
          </div>
        </div>
      </aside>
    </main>
  </div>
</div>

<script src="ameripro-runtime.js?v=1"></script>
<script src="data/ameripro-restaurants.js?v=1"></script>
<script src="static-local-layer.js?v=2"></script>
<script src="static-local-menu.js?v=3"></script>
<script src="static-local-ameripro.js?v=4"></script>
<script src="static-ameripro-tank-map-fill.js?v=1"></script>
<script src="static-restaurant-edit.js?v=1"></script>
<script src="static-local-restaurants.js?v=2"></script>
<script src="static-local-opportunity.js?v=3"></script>
<script src="static-local-cities.js?v=1"></script>
<script src="static-local-county-drilldown.js?v=2"></script>
<script src="static-local-outline.js?v=1"></script>
<script src="ameripro-app.js?v=1"></script>
</body>
</html>
